name: Android Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      # Necesaria para que Kyary (Gemini) funcione en el APK: Metro embebe las
      # EXPO_PUBLIC_* al bundlear. Sin esto la key queda vacía y Gemini rechaza
      # con "unregistered callers". Configurar como repo secret.
      EXPO_PUBLIC_GEMINI_API_KEY: ${{ secrets.EXPO_PUBLIC_GEMINI_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve release version
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Validate signing secrets
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64" || (echo "Missing ANDROID_KEYSTORE_BASE64 secret" && exit 1)
          test -n "$ANDROID_KEYSTORE_PASSWORD" || (echo "Missing ANDROID_KEYSTORE_PASSWORD secret" && exit 1)
          test -n "$ANDROID_KEY_ALIAS" || (echo "Missing ANDROID_KEY_ALIAS secret" && exit 1)
          test -n "$ANDROID_KEY_PASSWORD" || (echo "Missing ANDROID_KEY_PASSWORD secret" && exit 1)
          test -n "$EXPO_PUBLIC_GEMINI_API_KEY" || echo "::warning::EXPO_PUBLIC_GEMINI_API_KEY sin setear; Kyary no funcionará en este APK."

      - name: Install dependencies
        run: npm ci

      - name: Apply release version
        run: node ./scripts/set-release-version.mjs "$RELEASE_VERSION"

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --no-install --clean

      - name: Prepare Android release config
        run: node ./scripts/configure-android-release.mjs

      - name: Decode Android keystore
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/kanami-upload.keystore"

      - name: Build release APK
        working-directory: android
        run: |
          GRADLE_USER_HOME=$PWD/.gradle ./gradlew assembleRelease --console=plain \
            -PKANAMI_UPLOAD_STORE_FILE="$RUNNER_TEMP/kanami-upload.keystore" \
            -PKANAMI_UPLOAD_STORE_PASSWORD="$ANDROID_KEYSTORE_PASSWORD" \
            -PKANAMI_UPLOAD_KEY_ALIAS="$ANDROID_KEY_ALIAS" \
            -PKANAMI_UPLOAD_KEY_PASSWORD="$ANDROID_KEY_PASSWORD"

      - name: Prepare release artifacts
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk "dist/kanami-v${RELEASE_VERSION}-arm64-v8a.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/kanami-v${{ env.RELEASE_VERSION }}-arm64-v8a.apk
          generate_release_notes: true
